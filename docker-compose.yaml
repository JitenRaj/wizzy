version: "3.9"

services:
  wizzy:
    container_name: wizzy
    build: .
    ports:
      - "5173:5173"

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true

    command: ["npm", "run", "dev", "--", "--host"]

    restart: unless-stopped